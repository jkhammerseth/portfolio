<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CV — Jonas Hammerseth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .pdf-embed {
      width: 100%;
      height: 100%;
      border: none;
    }

    .back-button {
      position: fixed;
      top: 24px;
      left: 24px;
      background: rgba(247, 245, 242, 0.95);
      color: #1A1916;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s, color 0.2s;
      box-shadow: 0 2px 8px rgba(26, 25, 22, 0.1);
      z-index: 1000;
    }

    .back-button:hover {
      background: #C8A96E;
      color: white;
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-button">
    <span>←</span>
    <span id="back-text">Back</span>
  </a>
  <embed id="cv-embed" src="CV2026.pdf" type="application/pdf" class="pdf-embed">

  <script>
    // Load the correct CV based on language preference
    const lang = localStorage.getItem('lang') || 'en';
    const cvEmbed = document.getElementById('cv-embed');
    const backText = document.getElementById('back-text');

    if (lang === 'en') {
      cvEmbed.src = 'CV2026_eng.pdf';
      backText.textContent = 'Back';
    } else {
      cvEmbed.src = 'CV2026.pdf';
      backText.textContent = 'Tilbake';
    }
  </script>
</body>
</html>
